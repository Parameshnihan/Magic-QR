kind = "web"
previewPath = "/"
title = "ReviewFlow Pro"
version = "1.0.0"
id = "artifacts/review-flow-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22083

[services.development]
run = "pnpm --filter @workspace/review-flow-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/review-flow-pro", "run", "build" ]
publicDir = "artifacts/review-flow-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22083"
BASE_PATH = "/"
